name: Build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: UEFI
  FORCE_INSTALL: 1
  HAS_OPENSSL_BUILD: 1
  HAS_OPENSSL_W32BUILD: 0
  WERROR: 1

jobs:
  build-macos:
    name: macOS XCODE5
    runs-on: macos-latest
    env:
      JOB_TYPE: BUILD
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
       - uses: actions/checkout@v6

       - name: Install Linux Toolchain
         run: |
           brew tap FiloSottile/homebrew-musl-cross
           brew install musl-cross

       - name: Install Dependencies
         run: brew install mingw-w64

       - name: CI Bootstrap
         run: |
           src=$(/usr/bin/curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

       - run: ./build_duet.tool
       - run: ./build_oc.tool

       - name: Upload to Artifacts
         uses: actions/upload-artifact@v6
         with:
           name: macOS XCODE5 Artifacts
           path: Binaries/*.zip
       - name: Upload to Release
         if: github.event_name == 'release'
         uses: svenstaro/upload-release-action@04733e069f2d7f7f0b4aebc4fbdbce8613b03ccd
         with:
           repo_token: ${{ secrets.GITHUB_TOKEN }}
           file: Binaries/*.zip
           tag: ${{ github.ref }}
           file_glob: true

  build-linux-clangpdb:
    name: Linux CLANGPDB
    runs-on: ubuntu-24.04
    env:
      TOOLCHAINS: CLANGPDB
    steps:
       - uses: actions/checkout@v6

       - name: Apply Docker AppArmor settings
         run: |
           src=$(/usr/bin/curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/docker-apparmor.sh) && eval "$src" || exit 1

       - name: Use Docker in rootless mode.
         uses: ScribeMD/rootless-docker@0.2.2

       - name: ./build_duet.tool
         run: docker compose run build-duet

       - name: ./build_oc.tool
         run: docker compose run build-oc

       - name: Upload to Artifacts
         uses: actions/upload-artifact@v6
         with:
           name: Linux CLANGPDB Artifacts
           path: Binaries/*.zip

  build-linux-gcc5:
    name: Linux GCC
    runs-on: ubuntu-24.04
    env:
      TOOLCHAINS: GCC
    steps:
       - uses: actions/checkout@v6

       - name: Apply Docker AppArmor settings
         run: |
           src=$(/usr/bin/curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/docker-apparmor.sh) && eval "$src" || exit 1

       - name: Use Docker in rootless mode.
         uses: ScribeMD/rootless-docker@0.2.2

       - name: ./build_duet.tool
         run: docker compose run build-duet

       - name: ./build_oc.tool
         run: docker compose run build-oc

       - name: Upload to Artifacts
         uses: actions/upload-artifact@v6
         with:
           name: Linux GCC Artifacts
           path: Binaries/*.zip

  build-linux-clangdwarf:
    name: Linux CLANGDWARF
    runs-on: ubuntu-24.04
    env:
      TOOLCHAINS: CLANGDWARF
    steps:
       - uses: actions/checkout@v6

       - name: Apply Docker AppArmor settings
         run: |
           src=$(/usr/bin/curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/docker-apparmor.sh) && eval "$src" || exit 1

       - name: Use Docker in rootless mode.
         uses: ScribeMD/rootless-docker@0.2.2

       - name: ./build_duet.tool
         run: docker compose run build-duet

       - name: ./build_oc.tool
         run: docker compose run build-oc

       - name: Upload to Artifacts
         uses: actions/upload-artifact@v6
         with:
           name: Linux CLANGDWARF Artifacts
           path: Binaries/*.zip

  build-linux-docs:
    name: Linux Docs
    runs-on: ubuntu-24.04
    steps:
       - uses: actions/checkout@v6

       - name: Apply Docker AppArmor settings
         run: |
           src=$(/usr/bin/curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/docker-apparmor.sh) && eval "$src" || exit 1

       - name: Use Docker in rootless mode.
         uses: ScribeMD/rootless-docker@0.2.2

       - name: Docs
         run: docker compose run build-docs

build-windows:
    name: Windows VS2022
    runs-on: windows-latest
    env:
      HAS_OPENSSL_BUILD: 0
      CC: gcc
    steps:
       - uses: actions/checkout@v6

       - uses: actions/setup-python@v6
         id: python
         with:
           python-version: '3.x'

       - uses: TheMrMilchmann/setup-msvc-dev@v4
         with:
           arch: x86

       - name: Install Dependencies
         shell: cmd
         run: |
           choco install make nasm zip iasl --no-progress
           "%pythonLocation%\python.exe" -m pip install setuptools --quiet --force-reinstall

       - name: CI Bootstrap
         shell: bash
         env:
           PYTHON_COMMAND: ${{ steps.python.outputs.python-path }}
         run: |
           echo "=== Python detection ==="
           echo "PYTHON_COMMAND from setup-python: $PYTHON_COMMAND"
           # Convert bash-style path to Windows if needed (e.g., /c/... -> C:\...)
           if [[ "$PYTHON_COMMAND" == /c/* ]]; then
             PYTHON_COMMAND=$(cmd /c "echo ${PYTHON_COMMAND/\/c\//C:\\}" 2>/dev/null | tr -d '\r' || echo "$PYTHON_COMMAND")
             echo "Converted PYTHON_COMMAND: $PYTHON_COMMAND"
           fi
           # Ensure python is in cmd PATH for nmake detection
           if ! cmd /c 'where python >/dev/null 2>&1' 2>/dev/null; then
             echo "Adding python to cmd PATH..."
             PYTHON_CMD_DIR=$(cmd /c 'echo %PYTHON_COMMAND%' 2>/dev/null | tr -d '\r' | sed 's|\\[^\\]*$||')
             if [ -n "$PYTHON_CMD_DIR" ]; then
               PYTHON_COMMAND="$PYTHON_CMD_DIR\\python.exe"
               echo "Adjusted PYTHON_COMMAND: $PYTHON_COMMAND"
             fi
           fi
           export PATH="/c/ProgramData/chocolatey/bin:$PATH"
           src=$(curl -LfsS https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

       - name: Build Duet
         shell: bash
         run: |
           export PATH="/c/ProgramData/chocolatey/bin:$PATH"
           ./build_duet.tool

       - name: Build OpenCore
         shell: bash
         run: |
           export PATH="/c/ProgramData/chocolatey/bin:$PATH"
           ./build_oc.tool

       - name: Upload to Artifacts
         uses: actions/upload-artifact@v6
         with:
           name: Windows Artifacts
           path: Binaries/*.zip